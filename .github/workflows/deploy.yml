name: deploy

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: runner-vm
  cancel-in-progress: true

jobs:
  runner-vm:

    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      TS_HOSTNAME: vm-1
      TARGET_DURATION: 21600
      BACKUP_INTERVAL: 120

#################################################
# BLOCK 1 — CHECKOUT REPOSITORY
#################################################

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

#################################################
# BLOCK 2 — INSTALL REQUIRED PACKAGES
#################################################

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            curl \
            zip \
            unzip \
            openssh-server

#################################################
# BLOCK 3 — CONFIGURE HOSTNAME
#################################################

      - name: Set hostname
        run: |
          sudo hostnamectl set-hostname $TS_HOSTNAME
          echo "$TS_HOSTNAME" | sudo tee /etc/hostname
          sudo sed -i "s/127.0.1.1.*/127.0.1.1 $TS_HOSTNAME/" /etc/hosts || true

#################################################
# BLOCK 4 — ENABLE SSH ACCESS
#################################################

      - name: Configure SSH server
        run: |
          sudo sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl enable --now ssh
          sudo systemctl restart ssh

      - name: Set root password
        run: |
          echo "root:${{ secrets.PASSWORD }}" | sudo chpasswd

#################################################
# BLOCK 5 — INSTALL TAILSCALE
#################################################

      - name: Install and connect Tailscale
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo systemctl enable --now tailscaled
          sudo tailscale up \
            --authkey=$TS_AUTHKEY \
            --hostname=$TS_HOSTNAME \
            --accept-routes \
            --accept-dns
          TS_IP=$(sudo tailscale ip -4)
          echo "TS_IP=$TS_IP" >> $GITHUB_ENV
          echo "::notice::Tailscale IP = $TS_IP"

#################################################
# BLOCK 6 — PREPARE CONTAINER DIRECTORY
#################################################

      - name: Prepare container directory
        run: |
          sudo mkdir -p /root/container
          sudo chown -R root:root /root/container

#################################################
# BLOCK 7 — RESTORE CONTAINER FROM REPO
#################################################

      - name: Restore container.zip
        run: |
          if [ -f container.zip ]; then
            echo "Restoring container.zip"
            sudo cp container.zip /root/container.zip
            sudo unzip -o /root/container.zip -d /root/
          else
            echo "No container.zip found"
          fi

#################################################
# BLOCK 8 — CONFIGURE GIT
#################################################

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

#################################################
# BLOCK 9 — BACKUP SYSTEM
#################################################

      - name: Run backup loop
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          set -e

          START_TIME=$(date +%s)
          LAST_SHA=""

          while true
          do
            NOW=$(date +%s)
            ELAPSED=$((NOW - START_TIME))

            if [ $ELAPSED -ge $TARGET_DURATION ]; then
              echo "Max runtime reached"
              break
            fi

            echo "Creating backup..."

            sudo rm -f /root/container.zip || true
            sudo bash -c "cd /root && zip -rq container.zip container"

            NEW_SHA=$(sudo sha256sum /root/container.zip | awk '{print $1}')

            if [ "$NEW_SHA" != "$LAST_SHA" ]; then
              echo "Change detected"

              sudo cp /root/container.zip ./container.zip
              sudo chown $USER:$USER container.zip

              git pull origin main --rebase || true
              git add container.zip

              if ! git diff-index --quiet HEAD; then
                git commit -m "backup snapshot $NEW_SHA"
                git push \
                https://x-access-token:${GIT_TOKEN}@github.com/${{ github.repository }}.git \
                HEAD:main
              fi

              LAST_SHA=$NEW_SHA
            else
              echo "No changes"
            fi

            sleep $BACKUP_INTERVAL
          done

#################################################
# BLOCK 10 — FINAL BACKUP
#################################################

      - name: Final snapshot
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          echo "Creating final snapshot"

          sudo rm -f /root/container.zip
          sudo bash -c "cd /root && zip -rq container.zip container"

          sudo cp /root/container.zip ./container.zip
          sudo chown $USER:$USER container.zip

          git pull origin main --rebase || true
          git add container.zip

          if ! git diff-index --quiet HEAD; then
            git commit -m "final container backup"
            git push \
            https://x-access-token:${GIT_TOKEN}@github.com/${{ github.repository }}.git \
            HEAD:main
          fi
