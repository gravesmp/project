name: Runner VM

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'container/**'

permissions:
  contents: read

jobs:
  vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      HOSTNAME: runner-vm
      SYNC_INTERVAL: 60

    steps:

#################################################
# CHECKOUT REPOSITORY
#################################################

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

#################################################
# INSTALL PACKAGES
#################################################

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y git curl rsync openssh-server

#################################################
# SET HOSTNAME
#################################################

      - name: Configure hostname
        run: |
          sudo hostnamectl set-hostname $HOSTNAME
          echo "$HOSTNAME" | sudo tee /etc/hostname

#################################################
# ENABLE SSH
#################################################

      - name: Enable SSH
        run: |
          sudo sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl enable ssh
          sudo systemctl restart ssh

      - name: Set root password
        run: |
          echo "root:${{ secrets.PASSWORD }}" | sudo chpasswd

#################################################
# INSTALL TAILSCALE
#################################################

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo systemctl enable --now tailscaled

      - name: Connect Tailscale
        run: |
          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTHKEY }} \
            --hostname=$HOSTNAME \
            --accept-routes \
            --accept-dns

          echo "Tailscale IP:"
          sudo tailscale ip -4

#################################################
# CREATE CONTAINER FOLDER
#################################################

      - name: Create container folder
        run: |
          sudo mkdir -p /root/container

#################################################
# INITIAL IMPORT FROM REPO
#################################################

      - name: Import container from repo
        run: |
          if [ -d container ]; then
            echo "Importing repo container → /root/container"
            sudo rsync -av container/ /root/container/
          else
            echo "No container folder found in repo"
          fi

#################################################
# AUTO SYNC LOOP
#################################################

      - name: Start repo sync loop
        run: |
          while true
          do
            echo "Checking for repo updates..."

            git pull origin main || true

            if [ -d container ]; then
              echo "Syncing container files..."
              sudo rsync -av --delete container/ /root/container/
            fi

            sleep $SYNC_INTERVAL
          done
