name: deploy

on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ------------------------------------------------------------
      # 1. CHECKOUT CODE
      # ------------------------------------------------------------
      - name: Check repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # ------------------------------------------------------------
      # 2. SYNC FILE FROM REPO
      # ------------------------------------------------------------
      - name: Sync files from repo to /root/container/
        run: |
          if [ -d "container" ]; then
            sudo mkdir -p /root/container
            sudo rsync -a container/ /root/container/
            echo "Initial sync completed."
          else
            echo "Warning: 'container' folder not found in repository."
          fi

      # ------------------------------------------------------------
      # 3. SET HOSTNAME
      # ------------------------------------------------------------
      - name: Set hostname(vm-1)
        run: |
          sudo hostnamectl set-hostname vm-1
          echo "127.0.0.1 vm-1" | sudo tee -a /etc/hosts

      # ------------------------------------------------------------
      # 4. INSTALL AND CONFIGURE SSH
      # ------------------------------------------------------------
      - name: Install and configure ssh
        env:
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          if [ -z "$PASSWORD" ]; then
            echo "Error: PASSWORD secret is not set."
            exit 1
          fi

          sudo apt-get update -y > /dev/null
          sudo apt-get install -y openssh-server > /dev/null

          echo "root:$PASSWORD" | sudo chpasswd

          sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config

          sudo systemctl restart ssh

      # ------------------------------------------------------------
      # 5. REMOVE OLD TAILSCALE
      # ------------------------------------------------------------
      - name: Remove old tailscale(vm-1)
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_API_KEY }}
        run: |
          if [ -z "$TS_AUTHKEY" ]; then
            echo "Error: TAILSCALE_API_KEY secret is not set."
            exit 1
          fi

          sudo apt-get update > /dev/null && sudo apt-get install -y jq curl > /dev/null

          DEVICES=$(curl -s -u "$TS_AUTHKEY:" "https://api.tailscale.com/api/v2/tailnet/-/devices")
          DEVICE_ID=$(echo "$DEVICES" | jq -r '.devices[]? | select(.hostname == "vm-1") | .id' | head -n 1)

          if [ -n "$DEVICE_ID" ] && [ "$DEVICE_ID" != "null" ]; then
            curl -s -X DELETE -u "$TS_AUTHKEY:" "https://api.tailscale.com/api/v2/device/$DEVICE_ID"
            sleep 3
          fi

      # ------------------------------------------------------------
      # 6. INSTALL AND CONFIGURE TAILSCALE
      # ------------------------------------------------------------
      - name: Install and setup tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey="${{ secrets.TAILSCALE_AUTHKEY }}" --hostname="vm-1"

      # ------------------------------------------------------------
      # 7. INSTALL AND CONFIGURE CLOUDFLARE TUNNEL
      # ------------------------------------------------------------
      - name: Install and setup cloudflare tunnel
        env:
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_TOKEN" ]; then
            echo "Error: CLOUDFLARE_TOKEN is not set."
            exit 1
          fi

          sudo mkdir -p --mode=0755 /usr/share/keyrings
          curl -fsSL https://pkg.cloudflare.com/cloudflare-public-v2.gpg | sudo tee /usr/share/keyrings/cloudflare-public-v2.gpg >/dev/null

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main" | sudo tee /etc/apt/sources.list.d/cloudflared.list

          sudo apt-get update > /dev/null && sudo apt-get install -y cloudflared > /dev/null
          sudo cloudflared service install "$CLOUDFLARE_TOKEN"

      # ------------------------------------------------------------
      # 8. INSTALL NODE.JS (version 20)
      # ------------------------------------------------------------
      - name: Install node.js
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs

      # ------------------------------------------------------------
      # 9. CREATE A ALIAS "c"
      # ------------------------------------------------------------
      - name: Prepare application directory and add 'c' alias
        run: |
          # Directory already exists from step 2, but ensure it's there
          sudo mkdir -p /root/container
          echo "alias c='cd /root/container'" | sudo tee -a /root/.bashrc > /dev/null

      # ------------------------------------------------------------
      # 10. LIVE FILE SYNC AND KEEP-ALIVE (6 hours)
      # ------------------------------------------------------------
      - name: Live file sync and keep-alive
        run: |
          # -------- BACKGROUND LIVE SYNC (only files) --------
          (
            while true; do
              cd "$GITHUB_WORKSPACE"
              git fetch origin ${{ github.ref }} 2>&1 || echo "Fetch failed, continuing..."
              git reset --hard FETCH_HEAD 2>&1 || echo "Reset failed, continuing..."

              if [ -d "container" ]; then
                # Copy updated files to /root/container (no --delete)
                sudo rsync -a container/ /root/container/
              fi
              sleep 10
            done
          ) &

          # -------- KEEP JOB ALIVE FOR 6 HOURS --------
          sleep 360m
