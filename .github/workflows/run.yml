name: Tailscale & Cloudflare VM Runner (Manual Start)

# ONLY runs when manually triggered by the user
on:
  workflow_dispatch:

# Ensures strictly ONE runner exists at all times.
concurrency:
  group: single-vm-runner
  cancel-in-progress: false

jobs:
  persistent-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours max limit

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Checks out the specific branch you selected when manually triggering
          ref: ${{ github.ref }}

      - name: Remove Old vm-1 from Tailscale
        env:
          TS_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
        run: |
          if [ -z "$TS_API_KEY" ]; then
            echo "Error: TAILSCALE_API_KEY is not set. Please add it to GitHub Secrets."
            exit 1
          fi

          echo "Checking Tailscale network for an existing 'vm-1' device..."
          sudo apt-get update > /dev/null && sudo apt-get install -y jq curl > /dev/null
          
          # 1. Fetch all devices in your default Tailnet
          DEVICES=$(curl -s -u "$TS_API_KEY:" "https://api.tailscale.com/api/v2/tailnet/-/devices")
          
          # 2. Extract the device ID where the hostname is exactly 'vm-1'
          DEVICE_ID=$(echo "$DEVICES" | jq -r '.devices[]? | select(.hostname == "vm-1") | .id' | head -n 1)

          # 3. If found, delete it via the API
          if [ -n "$DEVICE_ID" ] &&[ "$DEVICE_ID" != "null" ]; then
            echo "Found existing 'vm-1' (ID: $DEVICE_ID). Removing it..."
            curl -s -X DELETE -u "$TS_API_KEY:" "https://api.tailscale.com/api/v2/device/$DEVICE_ID"
            echo "Successfully removed old vm-1."
            sleep 3 # Pause briefly to let the Tailscale network sync the deletion
          else
            echo "No existing 'vm-1' device found. Proceeding..."
          fi

      - name: Set Hostname to vm-1
        run: |
          sudo hostnamectl set-hostname vm-1
          echo "127.0.0.1 vm-1" | sudo tee -a /etc/hosts

      - name: Enable Root SSH and Set Password
        run: |
          # Ensure the SSH server is actually installed on the runner
          sudo apt-get update -y > /dev/null
          sudo apt-get install -y openssh-server > /dev/null

          # Set root password using GitHub Secret
          echo "root:${{ secrets.PASSWORD }}" | sudo chpasswd

          # Modify SSH config for root login and password auth
          sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          
          # Restart SSH daemon
          sudo systemctl restart ssh

      - name: Install and Setup Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          
          # Start Tailscale
          sudo tailscale up --authkey="${{ secrets.TAILSCALE_AUTHKEY }}" --hostname="vm-1"

      - name: Install and Setup Cloudflare Tunnel
        env:
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_TOKEN" ]; then
            echo "Error: CLOUDFLARE_TOKEN is not set. Please add it to GitHub Secrets."
            exit 1
          fi

          echo "Adding Cloudflare GPG key..."
          sudo mkdir -p --mode=0755 /usr/share/keyrings
          curl -fsSL https://pkg.cloudflare.com/cloudflare-public-v2.gpg | sudo tee /usr/share/keyrings/cloudflare-public-v2.gpg >/dev/null

          echo "Adding Cloudflare APT repository..."
          echo 'deb[signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main' | sudo tee /etc/apt/sources.list.d/cloudflared.list

          echo "Installing cloudflared..."
          sudo apt-get update > /dev/null && sudo apt-get install -y cloudflared > /dev/null

          echo "Starting Cloudflare Tunnel as a service..."
          sudo cloudflared service install "$CLOUDFLARE_TOKEN"

      - name: Install Node.js
        run: |
          echo "Installing Node.js (v20)..."
          # Download and run the NodeSource setup script
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          
          # Install Node.js
          sudo apt-get install -y nodejs
          
          # Verify installation
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"

      - name: Live Sync 'container' to /root/container & Keep Alive
        run: |
          echo "Setup complete! SSH via Tailscale: ssh root@vm-1"
          echo "Starting 6-hour auto-sync loop..."
          
          sudo mkdir -p /root/container

          # Add shortcut command 'c' for root user
          echo "alias c='cd /root/container'" | sudo tee -a /root/.bashrc > /dev/null

          # Loop continuously for ~6 hours (720 iterations * 30 seconds)
          for i in {1..720}; do
            # 1. Fetch the exact state of your GitHub repository branch
            git fetch origin ${{ github.ref }}
            git reset --hard FETCH_HEAD > /dev/null 2>&1
            
            # 2. Swap/Sync the 'container' folder to /root/container
            if [ -d "container" ]; then
              # Overwrites existing files, deletes missing files, adds new files
              sudo rsync -a --delete container/ /root/container/
              
              # 3. Read modules from modules.txt and install them
              if[ -f "modules.txt" ]; then
                # This converts any linebreaks in modules.txt to spaces
                MODULE_LIST=$(cat modules.txt | tr '\n' ' ')
                
                # Check if the file was not empty
                if [ -n "$MODULE_LIST" ]; then
                  (
                    cd /root/container/
                    # Suppress verbose npm logs but show warnings/errors
                    sudo npm install --silent $MODULE_LIST
                  )
                fi
              fi
            fi
            
            # Wait 30 seconds before pulling again
            sleep 30
          done
